<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽說讀寫練習室</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        #app { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-lvl { padding: 10px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-lvl.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .guide { background: #eef6ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 15px; border-left: 5px solid var(--primary); line-height: 1.6; }
        
        .audio-zone { background: #f1f3f5; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .btn-ctrl { background: #6c757d; color: white; padding: 8px 15px; border: none; border-radius: 5px; margin: 0 5px; cursor: pointer; }
        
        textarea { width: 100%; height: 150px; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; resize: none; outline: none; }
        textarea:focus { border-color: var(--primary); }
        
        .results-container { margin-top: 50px; line-height: 4.5; font-size: 26px; user-select: none; }
        .word-unit { position: relative; display: inline-block; margin: 0 4px; }
        
        /* 文字狀態 */
        .char-correct { color: #333; cursor: pointer; }
        .char-wrong { color: var(--error); font-weight: bold; cursor: pointer; border-bottom: 2px solid var(--error); }
        .char-variant { color: var(--warning); cursor: pointer; border-bottom: 2px solid var(--warning); }
        .char-punc { color: #ccc; cursor: default; }
