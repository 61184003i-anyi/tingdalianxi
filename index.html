<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽打練習</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container {
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%; max-width: 700px;
        }

        .progress-container { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: var(--success-color); width: 0%; transition: 0.3s; border-radius: 4px; }

        /* 音訊控制 */
        .audio-box { background: #f0f3f5; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .btn-group { display: flex; justify-content: center; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        button { border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-main { background: var(--primary-color); color: white; }
        .btn-sec { background: #95a5a6; color: white; }

        /* 輸入區 */
        textarea { width: 100%; height: 100px; padding: 15px; font-size: 22px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; resize: none; }
        .check-row { text-align: right; margin-top: 10px; }

        /* 對比顯示區 */
        #feedbackSection { margin-top: 25px; display: none; padding-top: 20px; border-top: 2px dashed #eee; }
        .comparison-box { font-size: 32px; line-height: 1.8; margin-bottom: 20px; letter-spacing: 2px; }
        
        .word-unit { cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: 0.2s; }
        .word-unit:hover { background: #eef; }
        .correct { color: #333; }
        .wrong { color: var(--error-color); border-bottom: 3px solid var(--error-color); }
        .missing { color: #ccc; text-decoration: line-through; }

        /* 詳細面板 */
        .detail-card { background: #edf7ff; padding: 15px; border-radius: 10px; border-left: 6px solid var(--primary-color); display: none; margin-top: 15px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .label { font-size: 12px; color: #7f8c8d; font-weight: bold; }
        .val-char { font-size: 40px; font-weight: bold; display: block; }
        .val-pinyin { font-size: 18px; color: #2c3e50; }
        .val-en { font-size: 14px; color: #7f8c8d; font-style: italic; }

        .next-btn { background: var(--success-color); color: white; width: 100%; font-size: 18px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container"><div class="progress-fill" id="prog"></div></div>
    
    <div class="audio-box">
        <h3 id="qTitle">加載中...</h3>
        <audio id="player"></audio>
        <div class="btn-group">
            <button onclick="changeTime(-1)" class="btn-sec">⏪ -1s</button>
            <button onclick="togglePlay()" id="playBtn" class="btn-main">播放音檔</button>
            <button onclick="changeTime(1)" class="btn-sec">+1s ⏩</button>
            <button onclick="changeSpeed()" id="speedBtn" class="btn-sec">速度 1.0x</button>
        </div>
    </div>

    <textarea id="userInput" placeholder="請聽音檔並輸入漢字..."></textarea>
    <div class="check-row">
        <button onclick="checkAnswer()" id="checkBtn" class="btn-main" style="background: #2c3e50;">檢查答案 (不需標點)</button>
    </div>

    <div id="feedbackSection">
        <div id="statusMsg" style="font-weight: bold; text-align: center; margin-bottom: 10px;"></div>
        <div class="comparison-box" id="compBox"></div>
        
        <div class="detail-card" id="detailCard">
            <div style="display:flex; justify-content: space-between;">
                <strong>點擊正確字可聽發音</strong>
                <span style="cursor:pointer" onclick="this.parentElement.parentElement.style.display='none'">✕</span>
            </div>
            <div class="detail-grid">
                <div>
                    <span class="label">你打的 You Typed</span>
                    <span id="vUserChar" class="val-char" style="color:var(--error-color)"></span>
                </div>
                <div onclick="speakCorrect()" style="cursor:pointer">
                    <span class="label">正確字 Correct</span>
                    <span id="vAnsChar" class="val-char"></span>
                    <span id="vAnsPinyin" class="val-pinyin"></span>
                    <div id="vAnsEn" class="val-en"></div>
                </div>
            </div>
        </div>
        <button onclick="nextQuest()" id="nextBtn" class="next-btn">下一題 Next ➔</button>
    </div>
</div>

<script>
    // 遊戲數據
    const data = [
        { q: "羅珊蒂，下課啦！怎麼樣？你們班上有我們上個學期的同學嗎？", p: ["Luó","shān","dì",",","xià","kè","la","!","zěn","me","yàng","?","nǐ","men","bān","shàng","yǒu","wǒ","men","shàng","ge","xué","qī","de","tóng","xué","ma","?"], en: ["Luo","coral","stem","","off","class","(p)","","how","","way","","you","(pl)","class","on/in","have","we","(pl)","last","(mw)","study","term","(p)","same","study","(q)",""], audio: "q1.mp3" },
        { q: "沒有，都沒有。你們班怎麼樣？", p: ["méi","yǒu",",","dōu","méi","yǒu",".","nǐ","men","bān","zěn","me","yàng","?"], en: ["no","have","","all","no","have","","you","(pl)","class","how","","way",""], audio: "q2.mp3" },
        { q: "都是新生，我一個也不認識，而且只有我一個男的。", p: ["dōu","shì","xīn","shēng",",","wǒ","yī","ge","yě","bù","rèn","shì",",","ér","qiě","zhǐ","yǒu","wǒ","yī","ge","nán","de","."], en: ["all","is","new","born","","I","one","(mw)","also","not","know","know","","and","also","only","have","I","one","(mw)","male","(p)",""], audio: "q3.mp3" },
        { q: "老師呢？老師怎麼樣？", p: ["lǎo","shī","ne","?","lǎo","shī","zěn","me","yàng","?"], en: ["old","master","(q)","","old","master","how","","way",""], audio: "q4.mp3" },
        { q: "老師很嚴。他說我們這學期除了每一課的口試、筆試以外還要做兩次口頭報告，我覺得壓力好大。你們班呢？", p: ["lǎo","shī","hěn","yán",".","tā","shuō","wǒ","men","zhè","xué","qī","chú","le","měi","yī","kè","de","kǒu","shì","、","bǐ","shì","yǐ","wài","hái","yào","zuò","liǎng","cì","kǒu","tóu","bào","gào",",","wǒ","jué","de","yā","lì","hǎo","dà",".","nǐ","men","bān","ne","?"], en: ["old","master","very","strict","","he","say","we","(pl)","this","term","term","except","(p)","every","one","class","(p)","mouth","test","","pen","test","by","outside","also","want","do","two","times","mouth","head","report","tell","","I","feel","(p)","press","force","very","big","","you","(pl)","class","(q)",""], audio: "q5.mp3" },
        { q: "老師的說明很清楚，同學也很熱情。我們今天就一起去吃中飯了。", p: ["lǎo","shī","de","shuō","míng","hěn","qīng","chǔ",",","tóng","xué","yě","hěn","rè","qíng",".","wǒ","men","jīn","tiān","jiù","yī","qǐ","qù","chī","zhōng","fàn","le","."], en: ["old","master","(p)","speak","clear","very","clear","clear","","same","study","also","very","hot","feeling","","we","(pl)","now","day","then","one","up","go","eat","mid","meal","(p)",""], audio: "q6.mp3" }
    ];

    // 繁簡簡單對應表 (核心字)
    const SC_TC = {"罗":"羅","珊":"珊","蒂":"蒂","下":"下","课":"課","啦":"啦","怎":"怎","么":"麼","样":"樣","你":"你","们":"們","班":"班","上":"上","有":"有","我":"我","个":"個","学":"學","期":"期","的":"的","同":"同","吗":"嗎","没":"沒","都":"都","是":"是","新":"新","生":"生","一":"一","也":"也","不":"不","认":"認","识":"識","而":"而","且":"且","只":"只","男":"男","老":"老","师":"師","呢":"呢","很":"很","严":"嚴","他":"他","说":"說","这":"這","除":"除","了":"了","每":"每","口":"口","试":"試","笔":"筆","以":"以","外":"外","还":"還","要":"要","做":"做","两":"兩","次":"次","头":"頭","报":"報","告":"告","觉":"覺","得":"得","压":"壓","力":"力","好":"好","大":"大","明":"明","清":"清","楚":"楚","热":"熱","情":"情","今":"今","天":"天","就":"就","起":"起","去":"去","吃":"吃","中":"中","饭":"飯"};

    let cur = 0, speed = 1.0;
    const player = document.getElementById('player');
    const uInput = document.getElementById('userInput');

    function loadQ() {
        document.getElementById('qTitle').innerText = `第 ${cur+1} 題 / 共 ${data.length} 題`;
        player.src = data[cur].audio;
        uInput.value = "";
        uInput.disabled = false;
        document.getElementById('prog').style.width = `${(cur/data.length)*100}%`;
        document.getElementById('feedbackSection').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('checkBtn').disabled = false;
    }

    function togglePlay() { player.paused ? player.play() : player.pause(); }
    function changeTime(sec) { player.currentTime += sec; }
    function changeSpeed() {
        speed = speed === 1.0 ? 0.75 : (speed === 0.75 ? 0.5 : 1.0);
        player.playbackRate = speed;
        document.getElementById('speedBtn').innerText = `速度 ${speed}x`;
    }

    function checkAnswer() {
        const item = data[cur];
        const rawUser = uInput.value.trim();
        
        // 1. 正規化：轉繁體、去標點
        const normalize = (str) => {
            let tc = "";
            for(let c of str) tc += SC_TC[c] || c;
            return tc.replace(/[，。？！、\s,.?!]/g, "");
        };

        const cleanAns = normalize(item.q);
        const cleanUser = normalize(rawUser);

        document.getElementById('feedbackSection').style.display = 'block';
        const compBox = document.getElementById('compBox');
        compBox.innerHTML = "";

        // 建立對比視圖
        const ansChars = item.q.split("").filter(c => !/[，。？！、,.?!]/.test(c));
        const userChars = cleanUser.split("");

        let isAllCorrect = (cleanAns === cleanUser);

        ansChars.forEach((target, i) => {
            let userChar = userChars[i] || "";
            let status = "";
            if (!userChar) status = "missing";
            else if (userChar === target) status = "correct";
            else status = "wrong";

            const span = document.createElement('span');
            span.className = `word-unit ${status}`;
            span.innerText = target;
            
            // 點擊顯示詳細對比
            span.onclick = () => showDetail(target, userChar, i);
            compBox.appendChild(span);
        });

        if (isAllCorrect) {
            document.getElementById('statusMsg').innerHTML = "🟢 完全正確！Excellent!";
            document.getElementById('nextBtn').style.display = 'block';
            uInput.disabled = true;
            document.getElementById('checkBtn').disabled = true;
        } else {
            document.getElementById('statusMsg').innerHTML = "🔴 有些字不對，點擊紅色的字看看。";
        }
    }

    let lastCorrect = "";
    function showDetail(ans, user, idx) {
        // 找到原始數據中的拼音與英文 (需補償標點符號造成的索引位移)
        // 簡單化處理：直接從原始 charData 找對應的字
        const card = document.getElementById('detailCard');
        card.style.display = 'block';
        
        // 獲取該句子的原始數據索引（包含標點）
        let pinyin = "", en = "";
        let count = 0;
        for(let j=0; j<data[cur].q.length; j++) {
            if(!/[，。？！、,.?!]/.test(data[cur].q[j])) {
                if(count === idx) {
                    pinyin = data[cur].p[j];
                    en = data[cur].en[j];
                    break;
                }
                count++;
            }
        }

        document.getElementById('vUserChar').innerText = user || "（空）";
        document.getElementById('vAnsChar').innerText = ans;
        document.getElementById('vAnsPinyin').innerText = pinyin;
        document.getElementById('vAnsEn').innerText = en;
        lastCorrect = ans;
        speakCorrect();
    }

    function speakCorrect() {
        if (!lastCorrect) return;
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(lastCorrect);
        ut.lang = 'zh-TW';
        ut.rate = 0.8;
        window.speechSynthesis.speak(ut);
    }

    function nextQuest() {
        cur++;
        if (cur >= data.length) {
            alert("恭喜完成所有練習！");
            cur = 0;
        }
        loadQ();
    }

    window.onload = loadQ;
</script>
</body>
</html>
