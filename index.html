<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華裔中文聽寫練習</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        /* 音訊控制區 */
        .audio-player {
            background-color: var(--secondary-color);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-play { background-color: var(--success-color); color: white; }
        .btn-pause { background-color: #f39c12; color: white; }
        .btn-skip { background-color: #95a5a6; color: white; }
        .btn-speed { background-color: var(--primary-color); color: white; }

        /* 輸入區 */
        .input-section {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 20px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .check-btn-container {
            text-align: right;
            margin-top: 10px;
        }

        .btn-check {
            background-color: var(--primary-color);
            color: white;
            font-size: 18px;
            padding: 12px 30px;
        }

        /* 回饋區 */
        .feedback-section {
            margin-top: 30px;
            border-top: 2px solid var(--secondary-color);
            padding-top: 20px;
            display: none; /* 預設隱藏 */
        }

        .result-status {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .status-correct { color: var(--success-color); }
        .status-error { color: var(--error-color); }

        /* 逐字對比區 */
        .comparison-display {
            font-size: 28px;
            line-height: 1.8;
            margin-bottom: 20px;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: var(--border-radius);
            background-color: #fafafa;
        }

        .word-unit {
            display: inline-block;
            margin: 0 2px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .word-unit:hover {
            background-color: #eaf2f8;
            border-bottom-color: var(--primary-color);
        }

        .correct { color: var(--text-color); }
        .incorrect { color: var(--error-color); text-decoration: underline; }
        .missing { color: #ccc; font-style: italic; } /* 漏掉的字 */

        /* 詳細回饋彈窗/區塊 */
        .detail-pane {
            background-color: #eaf2f8;
            padding: 20px;
            border-radius: var(--border-radius);
            display: none; /* 預設隱藏 */
            border-left: 5px solid var(--primary-color);
        }

        .detail-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
        }

        .close-detail {
            cursor: pointer;
            color: #888;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-item strong { display: block; color: #666; font-size: 14px; margin-bottom: 5px; }
        .detail-char { font-size: 36px; font-weight: bold; }
        .detail-pinyin { font-size: 18px; color: #555; }
        .detail-defn { font-size: 16px; color: #333; font-style: italic; }

        /* 進度條 */
        .progress-bar {
            height: 10px;
            background-color: #ddd;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.3s;
        }

        /* 下一題按鈕 */
        .next-btn-container {
            text-align: center;
            margin-top: 30px;
            display: none;
        }

        .btn-next {
            background-color: var(--success-color);
            color: white;
            font-size: 18px;
            padding: 12px 50px;
        }

        /* 輔助：拼音上標 */
        ruby {
            font-size: 28px;
        }
        rt {
            font-size: 12px;
            color: #777;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>華裔中文聽寫練習</h1>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="audio-player">
        <h3 id="questionTitle">第 1 題 / 共 6 題</h3>
        <audio id="mainAudio"></audio>
        <div class="controls">
            <button class="btn-pause" onclick="controlAudio('rewind')">⏪ -1s</button>
            <button class="btn-play" id="playBtn" onclick="controlAudio('play')">播放</button>
            <button class="btn-pause" id="pauseBtn" onclick="controlAudio('pause')" style="display:none;">暫停</button>
            <button class="btn-pause" onclick="controlAudio('forward')">⏩ +1s</button>
            <button class="btn-speed" id="speedBtn" onclick="controlAudio('speed')">速度: 1.0x</button>
        </div>
    </div>

    <div class="input-section">
        <textarea id="userInput" placeholder="請聽錄音，並將聽到的漢字打在這裡... (不必打標點符號)"></textarea>
        <div class="check-btn-container">
            <button class="btn-check" id="checkBtn" onclick="checkAnswer()">檢查答案</button>
        </div>
    </div>

    <div class="feedback-section" id="feedbackSection">
        <div class="result-status" id="resultStatus"></div>

        <div class="comparison-display" id="comparisonDisplay">
            </div>

        <div class="detail-pane" id="detailPane">
            <div class="detail-header">
                <span>單字詳解 (點擊聽發音)</span>
                <span class="close-detail" onclick="closeDetail()">✕</span>
            </div>
            <div class="detail-grid">
                <div class="detail-item">
                    <strong>你打的 You Typed</strong>
                    <div id="typedChar" class="detail-char --error-color"></div>
                    <div id="typedPinyin" class="detail-pinyin"></div>
                </div>
                <div class="detail-item" style="cursor:pointer;" onclick="speakCurrentCorrect()">
                    <strong>應該是 Correct</strong>
                    <div id="correctChar" class="detail-char"></div>
                    <div id="correctPinyin" class="detail-pinyin"></div>
                    <div id="correctDefn" class="detail-defn"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="next-btn-container" id="nextBtnContainer">
        <button class="btn-next" onclick="loadNextQuestion()">下一題 Next 🎉</button>
    </div>

</div>
