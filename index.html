<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽說讀寫練習室</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); padding: 20px; }
        #app { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn-lvl { padding: 8px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; }
        .btn-lvl.active { background: var(--primary); color: white; }
        
        .audio-zone { background: #f1f3f5; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        
        textarea { width: 100%; height: 120px; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        
        /* 結果顯示：以學生輸入的字為主 */
        .results-container { margin-top: 30px; line-height: 2.5; font-size: 26px; min-height: 200px; }
        .char-box { position: relative; display: inline-block; margin: 0 2px; cursor: pointer; border-bottom: 2px solid transparent; }
        
        .type-correct { color: #333; }
        .type-wrong { color: var(--error); border-bottom-color: var(--error); font-weight: bold; }
        .type-variant { color: var(--warning); border-bottom-color: var(--warning); }
        .type-extra { color: #999; text-decoration: line-through; } /* 學生多打的字 */

        /* 滑鼠滑過顯示正確答案 */
        .hover-tip {
            visibility: hidden; opacity: 0;
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 8px 12px; border-radius: 6px;
            font-size: 16px; white-space: nowrap; z-index: 10; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .char-box:hover .hover-tip { visibility: visible; opacity: 1; }
        .hover-tip b { color: var(--success); }

        .score-box { text-align: center; font-size: 22px; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header"><h1>聽說讀寫練習室</h1></div>

    <div class="nav">
        <button v-for="n in 6" :key="n" @click="changeLevel(n-1)" :class="['btn-lvl', { active: currentIdx === n-1 }]">第 {{n}} 題</button>
    </div>

    <div class="audio-zone">
        <button class="btn-main" @click="togglePlay">{{ isPlaying ? '⏸ 暫停' : '▶ 播放音檔' }}</button>
        <div style="margin-top:10px;">
            速度：
            <button v-for="s in [0.5, 0.75, 1.0]" @click="setSpeed(s)" :class="['btn-lvl', { active: playbackRate === s }]" style="padding:2px 8px; font-size:12px;">{{s}}x</button>
        </div>
        <audio ref="player" :src="`q${currentIdx+1}.mp3`" @play="isPlaying=true" @pause="isPlaying=false"></audio>
    </div>

    <div v-if="!submitted">
        <textarea v-model="userInput" placeholder="請在此輸入聽到的漢字..."></textarea>
        <div style="text-align:center;"><button class="btn-main" @click="checkAnswer" style="background:var(--success)">檢查我的答案</button></div>
    </div>

    <div v-else>
        <div class="score-box">得分：{{ score }}%</div>
        <div class="results-container">
            <span v-for="(item, i) in diffResults" :key="i" class="char-box" @click="speak(item.correctChar)">
                {{ item.inputChar }}
                
                <div class="hover-tip" v-if="item.type !== 'correct'">
                    正確答案：<b>{{ item.correctChar }}</b> <br>
                    拼音：{{ item.pinyin }}
                </div>
                <div class="hover-tip" v-else>
                    拼音：{{ item.pinyin }}
                </div>
            </span>

            <span v-if="missingText" style="color: #ccc; font-style: italic; margin-left: 10px;">
                (後方還有漏字...)
            </span>
        </div>
        
        <div style="text-align:center; margin-top:30px;">
            <button class="btn-lvl" @click="reset">重新嘗試</button>
            <button class="btn-main" @click="nextLevel" v-if="currentIdx < 5" style="margin-left:10px;">下一題</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref } = Vue;
const { pinyin } = pinyinPro;

const variants = { '体':'體', '国':'國', '说':'說', '这':'這', '么':'麼', '系':'係', '学':'學', '门':'門', '再':'在', '你':'妳', '妳':'你' };

createApp({
    setup() {
        const quizData = [
            "羅珊蒂，下課啦！怎麼樣？你們班上有我們上個學期的同學嗎？",
            "沒有，都沒有。你們班怎麼樣？",
            "都是新生，我一個也不認識，而且只有我一個男的。",
            "老師呢？老師怎麼樣？",
            "老師很嚴。他說我們這學期除了每一課的口試、筆試以外還要做兩次口頭報告，我覺得壓力好大。你們班呢？",
            "老師的說明很清楚，同學也很熱情。我們今天就一起去吃中飯了。"
        ];

        const currentIdx = ref(0);
        const userInput = ref("");
        const submitted = ref(false);
        const isPlaying = ref(false);
        const playbackRate = ref(1.0);
        const player = ref(null);
        const diffResults = ref([]);
        const score = ref(0);
        const missingText = ref(false);

        const togglePlay = () => { if (player.value.paused) player.value.play(); else player.value.pause(); };
        const setSpeed = (s) => { playbackRate.value = s; player.value.playbackRate = s; };

        const checkAnswer = () => {
            const target = quizData[currentIdx.value].replace(/[^\u4e00-\u9fa5]/g, ""); // 只留漢字
            const input = userInput.value.replace(/[^\u4e00-\u9fa5]/g, "");
            
            let results = [];
            let correctCount = 0;
            const maxLen = Math.max(target.length, input.length);

            for (let i = 0; i < input.length; i++) {
                const iChar = input[i];
                const tChar = target[i] || ""; // 如果學生打太長，target 就沒字了
                let type = 'wrong';

                if (iChar === tChar) {
                    type = 'correct';
                    correctCount++;
                } else if (variants[iChar] === tChar) {
                    type = 'variant';
                    correctCount++;
                } else if (!tChar) {
                    type = 'extra'; // 多打的字
                }

                results.push({
                    inputChar: iChar,
                    correctChar: tChar || "（多打的）",
                    type: type,
                    pinyin: tChar ? pinyin(tChar, { toneType: 'symbol' }) : ""
                });
            }

            diffResults.value = results;
            missingText.value = target.length > input.length;
            score.value = Math.round((correctCount / target.length) * 100);
            submitted.value = true;
        };

        const speak = (t) => {
            if (!t || t.includes("多打")) return;
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-TW';
            window.speechSynthesis.speak(u);
        };

        const changeLevel = (i) => { currentIdx.value = i; reset(); };
        const nextLevel = () => { currentIdx.value++; reset(); };
        const reset = () => { submitted.value = false; userInput.value = ""; isPlaying.value = false; };

        return { currentIdx, userInput, submitted, isPlaying, playbackRate, player, diffResults, score, missingText, togglePlay, setSpeed, checkAnswer, speak, changeLevel, nextLevel, reset };
    }
}).mount('#app');
</script>
</body>
</html>
