<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽說讀寫練習室 - 識字挑戰</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        #app { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .level-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn-lvl { padding: 8px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-lvl.active { background: var(--primary); color: white; }
        
        /* 播放器控制 */
        .audio-zone { background: #f1f3f5; padding: 25px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .big-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
        .btn-main { background: var(--primary); color: white; padding: 15px 35px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: bold; }
        .btn-skip { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .speed-group { display: flex; justify-content: center; gap: 8px; }
        .btn-speed { padding: 5px 12px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-speed.active { background: #495057; color: white; }

        textarea { width: 100%; height: 160px; padding: 15px; font-size: 20px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; resize: none; margin-bottom: 20px; outline: none; }
        textarea:focus { border-color: var(--primary); }

        /* 結果顯示區域 */
        .results-container { margin-top: 30px; line-height: 3; font-size: 28px; }
        .char-box { position: relative; display: inline-block; margin: 0 3px; cursor: pointer; }
        
        /* 狀態顏色 */
        .status-correct { color: #333; }
        .status-wrong { color: var(--error); border-bottom: 3px solid var(--error); font-weight: bold; }
        .status-variant { color: var(--warning); border-bottom: 3px solid var(--warning); }
        .status-extra { color: #aaa; text-decoration: line-through; }

        /* Hover 彈出視窗 */
        .hover-info {
            visibility: hidden; opacity: 0;
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: #2c3e50; color: #fff; padding: 10px 15px; border-radius: 8px;
            font-size: 16px; white-space: nowrap; z-index: 100; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); line-height: 1.4; text-align: center;
        }
        .char-box:hover .hover-info { visibility: visible; opacity: 1; }
        .hover-info b { color: var(--success); font-size: 20px; }
        .hover-info .label { font-size: 12px; color: #bdc3c7; display: block; margin-bottom: 2px; }

        .score-box { text-align: center; font-size: 26px; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
        .hint { font-size: 14px; color: #7f8c8d; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <h1>聽說讀寫練習室</h1>
        <p v-if="currentIdx === 0" style="color:var(--error); font-weight:bold;">* 第一題人名（羅珊蒂、安德思）打錯沒關係！</p>
    </div>

    <div class="level-nav">
        <button v-for="n in 6" :key="n" @click="changeLevel(n-1)" :class="['btn-lvl', { active: currentIdx === n-1 }]">
            第 {{ n }} 題
        </button>
    </div>

    <div class="audio-zone">
        <div class="big-controls">
            <button class="btn-skip" @click="skip(-5)">⏪ -5s</button>
            <button class="btn-main" @click="togglePlay">{{ isPlaying ? '⏸ PAUSE' : '▶ PLAY' }}</button>
            <button class="btn-skip" @click="skip(5)">+5s ⏩</button>
        </div>
        <div class="speed-group">
            <button v-for="s in [0.5, 0.75, 1.0]" @click="setSpeed(s)" :class="['btn-speed', { active: playbackRate === s }]">
                {{ s }}x Speed
            </button>
        </div>
        <audio ref="player" :src="`q${currentIdx+1}.mp3`" @play="isPlaying=true" @pause="isPlaying=false"></audio>
    </div>

    <div v-if="!submitted">
        <textarea v-model="userInput" placeholder="Listen and type the Chinese characters here..."></textarea>
        <div style="text-align:center;">
            <button class="btn-main" @click="checkAnswer" style="background:var(--success)">繳交答案 (Submit)</button>
        </div>
        <p class="hint">註：標點符號（，。？！）不計入評分。</p>
    </div>

    <div v-else>
        <div class="score-box">得分：{{ score }}%</div>
        <div class="results-container">
            <span v-for="(item, i) in diffResults" :key="i" class="char-box" @click="speak(item.correctChar)">
                <span :class="'status-' + item.type">{{ item.inputChar }}</span>
                
                <div class="hover-info">
                    <span v-if="item.type === 'correct'">
                        <span class="label">拼音</span>
                        {{ item.pinyin }}
                    </span>
                    <span v-else-if="item.type === 'variant'">
                        <span class="label">繁簡對照</span>
                        輸入：{{ item.inputChar }} → 正確：<b>{{ item.correctChar }}</b>
                        <br>{{ item.pinyin }}
                    </span>
                    <span v-else-if="item.type === 'wrong'">
                        <span class="label">正確答案</span>
                        <b>{{ item.correctChar }}</b>
                        <br>{{ item.pinyin }}
                        <br><small v-if="item.trans">({{ item.trans }})</small>
                    </span>
                    <span v-else-if="item.type === 'extra'">
                        <span class="label">多打的字</span>
                        此處無文字
                    </span>
                </div>
            </span>
            <span v-if="missingCount > 0" style="color:#bdc3c7; font-size:18px; margin-left:10px;">
                ... (漏掉 {{ missingCount }} 個字)
            </span>
        </div>
        
        <div style="text-align:center; margin-top:40px;">
            <button class="btn-lvl" @click="reset">重新嘗試 (Retry)</button>
            <button class="btn-main" @click="nextLevel" v-if="currentIdx < 5" style="margin-left:20px;">下一題 (Next)</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref } = Vue;
const { pinyin } = pinyinPro;

const variants = { '体':'體', '国':'國', '说':'說', '这':'這', '么':'麼', '系':'係', '学':'學', '门':'門', '再':'在', '你':'妳', '妳':'你', '面':'麵', '裡':'裏' };

createApp({
    setup() {
        const quizData = [
            { text: "羅珊蒂，下課啦！怎麼樣？你們班上有我們上個學期的同學嗎？", trans: { "學期": "semester", "同學": "classmate" } },
            { text: "沒有，都沒有。你們班怎麼樣？", trans: { "怎麼樣": "how is it" } },
            { text: "都是新生，我一個也不認識，而且只有我一個男的。", trans: { "新生": "new student", "認識": "know" } },
            { text: "老師呢？老師怎麼樣？", trans: { "老師": "teacher" } },
            { text: "老師很嚴。他說我們這學期除了每一課的口試、筆試以外還要做兩次口頭報告，我覺得壓力好大。你們班呢？", trans: { "口試": "oral exam", "壓力": "stress" } },
            { text: "老師的說明很清楚，同學也很熱情。我們今天就一起去吃中飯了。", trans: { "說明": "explanation", "熱情": "enthusiastic" } }
        ];

        const currentIdx = ref(0);
        const userInput = ref("");
        const submitted = ref(false);
        const isPlaying = ref(false);
        const playbackRate = ref(1.0);
        const player = ref(null);
        const diffResults = ref([]);
        const score = ref(0);
        const missingCount = ref(0);

        const togglePlay = () => { if (player.value.paused) player.value.play(); else player.value.pause(); };
        const setSpeed = (s) => { playbackRate.value = s; player.value.playbackRate = s; };
        const skip = (v) => { player.value.currentTime += v; };

        const checkAnswer = () => {
            const targetStr = quizData[currentIdx.value].text.replace(/[^\u4e00-\u9fa5]/g, "");
            const inputStr = userInput.value.replace(/[^\u4e00-\u9fa5]/g, "");
            const transMap = quizData[currentIdx.value].trans;
            
            let results = [];
            let correctCount = 0;

            for (let i = 0; i < inputStr.length; i++) {
                const iChar = inputStr[i];
                const tChar = targetStr[i] || "";
                let type = 'wrong';

                if (iChar === tChar) {
                    type = 'correct';
                    correctCount++;
                } else if (variants[iChar] === tChar || variants[tChar] === iChar) {
                    type = 'variant';
                    correctCount++;
                } else if (!tChar) {
                    type = 'extra';
                }

                results.push({
                    inputChar: iChar,
                    correctChar: tChar,
                    type: type,
                    pinyin: tChar ? pinyin(tChar, { toneType: 'symbol' }) : "",
                    trans: findTrans(tChar, transMap)
                });
            }

            diffResults.value = results;
            missingCount.value = Math.max(0, targetStr.length - inputStr.length);
            score.value = Math.round((correctCount / targetStr.length) * 100);
            submitted.value = true;
        };

        const findTrans = (char, map) => {
            for (let key in map) { if (key.includes(char)) return map[key]; }
            return "";
        };

        const speak = (t) => {
            if (!t) return;
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-TW';
            window.speechSynthesis.speak(u);
        };

        const changeLevel = (i) => { currentIdx.value = i; reset(); };
        const nextLevel = () => { currentIdx.value++; reset(); };
        const reset = () => { 
            submitted.value = false; userInput.value = ""; 
            if (player.value) { player.value.pause(); player.value.currentTime = 0; }
        };

        return { currentIdx, userInput, submitted, isPlaying, playbackRate, player, diffResults, score, missingCount, togglePlay, setSpeed, skip, checkAnswer, speak, changeLevel, nextLevel, reset };
    }
}).mount('#app');
</script>
</body>
</html>
